<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genie AI | Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .auth-card {
            animation: entryEffect 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes entryEffect {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div
        class="auth-card w-full max-w-lg bg-white/10 backdrop-blur-3xl border border-white/10 rounded-[2.5rem] p-12 shadow-2xl space-y-10 text-center">
        <!-- Brand Section -->
        <div class="space-y-6">
            <div
                class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-5xl shadow-2xl ring-8 ring-blue-500/20 transform -rotate-3">
                🧞</div>
            <div class="space-y-2">
                <h1 class="text-4xl font-black text-white tracking-tight">Genie AI</h1>
                <p class="text-slate-400 font-medium text-lg leading-snug">Your Enterprise Data Intelligence Engine</p>
            </div>
        </div>

        <!-- Auth Section -->
        <div class="space-y-4">
            <button onclick="startAuthFlow()"
                class="w-full bg-white text-slate-900 font-bold py-5 rounded-2xl hover:bg-blue-600 hover:text-white transition-all transform active:scale-95 flex items-center justify-center gap-4 text-lg shadow-xl group">
                Enterprise Login
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:translate-x-1 transition-transform"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>

            <!-- Error State -->
            <div id="error-message" class="hidden animate-pulse">
                <p class="text-red-400 text-sm font-bold bg-red-950/30 py-3 rounded-xl border border-red-500/20">
                    Authentication Failed. Please try again.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="pt-8 border-t border-white/5 flex flex-col items-center gap-3">
            <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest flex items-center gap-2">
                Secured by Auth0
                <span class="w-1 h-1 bg-green-500 rounded-full"></span>
            </p>
            <p class="text-[10px] text-slate-600 font-medium">Restricted to authorized organizational identities.</p>
        </div>
    </div>

    <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
    <script>
        // Initialize Teams SDK
        let teamsHandshake = false;
        if (typeof microsoftTeams !== 'undefined') {
            microsoftTeams.app.initialize().then(() => {
                console.log("Teams SDK initialized");
                teamsHandshake = true;
            }).catch(err => {
                console.log("Not in Teams context", err);
            });
        }

        function inTeams() {
            // Basic detection: check if in an iframe and if microsoftTeams initialized
            return window.self !== window.top || teamsHandshake;
        }

        function startAuthFlow() {
            if (inTeams()) {
                console.log("Starting Teams Auth popup...");
                microsoftTeams.authentication.authenticate({
                    url: window.location.origin + "/auth/start?teams=true",
                    width: 600,
                    height: 535
                }).then(() => {
                    console.log("Auth success from popup");
                    window.location.href = "/";
                }).catch(err => {
                    console.error("Auth failed:", err);
                    document.getElementById('error-message').classList.remove('hidden');
                });
            } else {
                console.log("Standard redirect auth...");
                window.location.href = "/auth/start";
            }
        }

        // Check for error in URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'auth_failed') {
            document.getElementById('error-message').classList.remove('hidden');
        }
    </script>
</body>

</html>
